name: 'Docs Image Release'

on:
  push:
    branches:
      - main
    paths:
      - 'VERSION'
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  ACR_ENDPOINT: swanlab-registry.cn-hangzhou.cr.aliyuncs.com
  ACR_NAMESPACE: internal
  ACR_REPO: swanlab-docs
  ACR_INSTANCE_ID: ${{ secrets.ACR_INSTANCE_ID }}
  ACR_REPO_ID: ${{ secrets.ACR_REPO_ID }}

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📖 Read Version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "Version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 🔧 Install aliyun CLI & CR plugin
        env:
          ALIBABA_CLOUD_USER_AGENT: AlibabaCloud-Agent-Skills
        run: |
          /bin/bash -c "$(curl -fsSL --connect-timeout 10 --max-time 120 https://aliyuncli.alicdn.com/setup.sh)"
          aliyun plugin install --names cr

      - name: 🔍 Check ACR Tag
        id: check
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ACR_USERNAME }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ACR_PASSWORD }}
          ALIBABA_CLOUD_REGION_ID: cn-hangzhou
          ALIBABA_CLOUD_USER_AGENT: AlibabaCloud-Agent-Skills
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          EXISTING=$(aliyun cr list-repo-tag \
            --endpoint "$ACR_ENDPOINT" \
            --instance-id "$ACR_INSTANCE_ID" \
            --repo-id "$ACR_REPO_ID" \
            --tag-name "$VERSION" \
            --page-no 1 \
            --page-size 1 \
            --quiet \
            --cli-query "Tags[0].Tag" 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "⏭️ Tag $VERSION already exists in ACR, skipping build"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🔨 Trigger ACR Build
        if: steps.check.outputs.skip != 'true'
        id: build
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ACR_USERNAME }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ACR_PASSWORD }}
          ALIBABA_CLOUD_REGION_ID: cn-hangzhou
          ALIBABA_CLOUD_USER_AGENT: AlibabaCloud-Agent-Skills
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Get build rule ID
          RULE_ID=$(aliyun cr list-repo-build-rule \
            --endpoint "$ACR_ENDPOINT" \
            --instance-id "$ACR_INSTANCE_ID" \
            --repo-id "$ACR_REPO_ID" \
            --quiet \
            --cli-query "BuildRules[0].BuildRuleId")

          echo "Rule ID: $RULE_ID"

          # Update build-args from GitHub Secrets (UMAMI_WEBSITE_ID may change)
          aliyun cr update-build-rule \
            --endpoint "$ACR_ENDPOINT" \
            --instance-id "$ACR_INSTANCE_ID" \
            --repo-id "$ACR_REPO_ID" \
            --build-rule-id "$RULE_ID" \
            --build-env "UMAMI_WEBSITE_ID=${{ secrets.UMAMI_WEBSITE_ID }}" \
            --build-args "UMAMI_WEBSITE_ID=${{ secrets.UMAMI_WEBSITE_ID }}" \
            --quiet

          # Trigger build manually
          BUILD_RECORD=$(aliyun cr create-build-record-by-rule \
            --endpoint "$ACR_ENDPOINT" \
            --instance-id "$ACR_INSTANCE_ID" \
            --repo-id "$ACR_REPO_ID" \
            --build-rule-id "$RULE_ID" \
            --quiet \
            --cli-query "BuildRecordId")

          echo "Build Record ID: $BUILD_RECORD"
          echo "build_record=$BUILD_RECORD" >> "$GITHUB_OUTPUT"

          # Poll build status
          echo "Waiting for ACR build to complete..."
          for i in $(seq 1 60); do
            sleep 10
            STATUS=$(aliyun cr get-repo-build-record-status \
              --endpoint "$ACR_ENDPOINT" \
              --instance-id "$ACR_INSTANCE_ID" \
              --repo-id "$ACR_REPO_ID" \
              --build-record-id "$BUILD_RECORD" \
              --quiet \
              --cli-query "BuildStatus")
            echo "  [$i] Status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "✅ Build succeeded"
              break
            fi
            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "::error::Build $STATUS"
              exit 1
            fi
          done

          if [ "$STATUS" != "SUCCESS" ]; then
            echo "::error::Build did not complete within 10 minutes"
            exit 1
          fi

          # Tag: latest -> version
          aliyun cr create-repo-tag \
            --endpoint "$ACR_ENDPOINT" \
            --instance-id "$ACR_INSTANCE_ID" \
            --namespace-name "$ACR_NAMESPACE" \
            --repo-name "$ACR_REPO" \
            --from-tag "latest" \
            --to-tag "$VERSION" \
            --quiet

          echo "✅ Tagged: $ACR_ENDPOINT/$ACR_NAMESPACE/$ACR_REPO:$VERSION"

      - name: 🏷️ Push Git Tag
        if: steps.check.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: 📦 Summary
        if: always()
        run: |
          if [ "${{ steps.check.outputs.skip }}" = "true" ]; then
            echo "## ⏭️ Skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Image tag already exists in ACR, no build needed." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.build.outcome }}" = "success" ]; then
            VERSION="${{ steps.version.outputs.version }}"
            echo "## 🚀 Release v${VERSION}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Image: \`${ACR_ENDPOINT}/${ACR_NAMESPACE}/${ACR_REPO}:${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Also tagged: \`${ACR_ENDPOINT}/${ACR_NAMESPACE}/${ACR_REPO}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ❌ Release Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "ACR build did not complete successfully. Check the build step logs for details." >> "$GITHUB_STEP_SUMMARY"
          fi

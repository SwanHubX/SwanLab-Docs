name: "Verify APP_VERSION"

on:
  push:
    branches:
      - main
    paths:
      - "APP_VERSION"
      - "zh/self_host/docker/offline-deployment.md"
      - "en/self_host/docker/offline-deployment.md"
      - "zh/self_host/docker/deploy.md"
      - "zh/self_host/kubernetes/deploy.md"
      - "en/self_host/kubernetes/deploy.md"
  pull_request:
    branches:
      - main
    paths:
      - "APP_VERSION"
      - "zh/self_host/docker/offline-deployment.md"
      - "en/self_host/docker/offline-deployment.md"
      - "zh/self_host/docker/deploy.md"
      - "zh/self_host/kubernetes/deploy.md"
      - "en/self_host/kubernetes/deploy.md"
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔍 Verify APP_VERSION consistency
        run: |
          APP_VERSION=$(cat APP_VERSION | tr -d '[:space:]')
          echo "APP_VERSION: $APP_VERSION"

          if [ -z "$APP_VERSION" ]; then
            echo "::error::APP_VERSION file is empty"
            exit 1
          fi

          # Files to check
          FILES=(
            "zh/self_host/docker/offline-deployment.md"
            "en/self_host/docker/offline-deployment.md"
            "zh/self_host/kubernetes/deploy.md"
            "en/self_host/kubernetes/deploy.md"
          )

          FAILED=0
          for f in "${FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::warning::File not found: $f"
              continue
            fi

            # Check swanlab-* image versions
            MISMATCH=$(grep -nE 'swanlab-(server|house|cloud|next):v[0-9]' "$f" | grep -v "$APP_VERSION" || true)
            if [ -n "$MISMATCH" ]; then
              echo "::error::Version mismatch in $f:"
              echo "$MISMATCH"
              FAILED=1
            fi

            # Check banner version
            BANNER_MISMATCH=$(grep -n 'Self-Hosted Docker v' "$f" | grep -v "$APP_VERSION" || true)
            if [ -n "$BANNER_MISMATCH" ]; then
              echo "::error::Banner version mismatch in $f:"
              echo "$BANNER_MISMATCH"
              FAILED=1
            fi

            # Check header version (当前/Current APP_VERSION)
            HEADER_MISMATCH=$(grep -nE '\*\*(当前|Current)APP_VERSION: v[0-9]' "$f" | grep -v "$APP_VERSION" || true)
            if [ -n "$HEADER_MISMATCH" ]; then
              echo "::error::Header version mismatch in $f:"
              echo "$HEADER_MISMATCH"
              FAILED=1
            fi
          done

          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "Run 'make bump-version V=$APP_VERSION' to fix."
            exit 1
          fi

          echo "✅ All docs match APP_VERSION=$APP_VERSION"

      - name: 📦 Summary
        if: always()
        run: |
          APP_VERSION=$(cat APP_VERSION | tr -d '[:space:]')
          echo "## 🔍 APP_VERSION Verification" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **APP_VERSION**: \`$APP_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status**: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

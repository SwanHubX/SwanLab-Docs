server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  error_page 404 /404.html;
  absolute_redirect off;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_types
    text/css
    text/javascript
    text/markdown
    text/plain
    text/xml
    application/javascript
    application/json
    application/manifest+json
    application/wasm
    application/xml
    image/svg+xml;

  location = /zh {
    return 301 /;
  }

  location = /zh/ {
    return 301 /;
  }

  location ~ ^/zh/(.+)/$ {
    return 301 /$1/$is_args$args;
  }

  location ~ ^/zh/(.+)$ {
    if (-f $document_root/$1.html) {
      return 301 /$1.html$is_args$args;
    }

    if (-d $document_root/$1) {
      return 301 /$1/$is_args$args;
    }

    return 301 /$1$is_args$args;
  }

  location ^~ /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location ~* \.(?:md|markdown|txt)$ {
    types {
      text/markdown md markdown;
      text/plain txt;
    }
    default_type text/plain;
    charset utf-8;
    try_files $uri =404;
    add_header Cache-Control "no-cache";
  }

  location = /vp-icons.css {
    try_files $uri =404;
    add_header Cache-Control "no-cache";
  }

  location ~ ^(.+[^/])$ {
    if (-f $document_root$uri.html) {
      return 301 $uri.html$is_args$args;
    }

    if (-d $document_root$uri) {
      return 301 $uri/$is_args$args;
    }

    try_files $uri =404;
    add_header Cache-Control "no-cache";
  }

  location / {
    try_files $uri $uri/ =404;
    add_header Cache-Control "no-cache";
  }
}

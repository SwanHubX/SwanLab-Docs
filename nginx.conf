server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  error_page 404 /404.html;

  location = /zh {
    return 302 /;
  }

  location ^~ /zh/ {
    rewrite ^/zh/(.*)$ /$1 redirect;
  }

  location ^~ /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location ~* \.(?:md|markdown|txt)$ {
    types {
      text/markdown md markdown;
      text/plain txt;
    }
    default_type text/plain;
    charset utf-8;
    try_files $uri =404;
    add_header Cache-Control "no-cache";
  }

  location = /vp-icons.css {
    try_files $uri =404;
    add_header Cache-Control "no-cache";
  }

  location / {
    try_files $uri $uri.html $uri/ =404;
    add_header Cache-Control "no-cache";
  }
}